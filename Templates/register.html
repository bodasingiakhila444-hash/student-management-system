<!DOCTYPE html>
<html>
    <head>
        <title>Register</title>
        <link rel="stylesheet" href="/static/style.css">
    </head>
    <body>
        <h2>User Registration</h2>
        <form method="POST">
            <label>Usename:</label>
            <input type="text" name="username" required><br><br>

        </form>
        <br>
        <a href="/login">Already have an account? Login</a>
    </body>

</html>
